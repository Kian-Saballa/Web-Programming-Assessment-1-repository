<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="Chp 6.css">
</head>
<body>
<!--Almost everything is in css or js-->
    <div class="calculator-card">
        <h2>Petrol Cost Calculator</h2>
<!--calculation process-->        
        <div class="input-group">
            <label for="price">Cost per Liter (£):</label>
            <input type="number" id="price" value="1.72" step="0.01">
        </div>

        <div class="input-group">
            <label for="liters">Liters Purchased:</label>
            <input type="number" id="liters" value="0" step="0.1">
        </div>

        <button id="calcBtn">Calculate Total</button>
<!--total or final amount-->
        <p id="totalDisplay">Total Cost: £0.00</p>
    </div>

    <script src="Chp 6.js"></script>
</body>
</html>
